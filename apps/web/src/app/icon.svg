<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="1" stop-color="#141414"/>
    </linearGradient>
    
    <radialGradient id="glowOrb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Core glow -->
  <circle cx="256" cy="256" r="160" fill="url(#glowOrb)" opacity="0.6"/>
  <circle cx="256" cy="256" r="64" fill="url(#glowOrb)" opacity="0.9"/>
  <circle cx="256" cy="256" r="24" fill="#ffffff"/>

  <!-- Orbiting rings to represent routing pathways -->
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="url(#ring1)" stroke-width="12" transform="rotate(-30 256 256)" stroke-dasharray="800" stroke-dashoffset="100" stroke-linecap="round"/>
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="url(#ring2)" stroke-width="12" transform="rotate(30 256 256)" stroke-dasharray="800" stroke-dashoffset="100" stroke-linecap="round"/>
  
  <!-- Subtle thin tracking lines -->
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="white" stroke-width="2" transform="rotate(-30 256 256)" opacity="0.2"/>
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="white" stroke-width="2" transform="rotate(30 256 256)" opacity="0.2"/>
  
  <!-- Data nodes on the rings -->
  <!-- Node 1 -->
  <circle cx="118" cy="176" r="16" fill="#38bdf8" opacity="0.5"/>
  <circle cx="118" cy="176" r="8" fill="#ffffff"/>
  
  <!-- Node 2 -->
  <circle cx="394" cy="176" r="16" fill="#a855f7" opacity="0.5"/>
  <circle cx="394" cy="176" r="8" fill="#ffffff"/>
</svg>
